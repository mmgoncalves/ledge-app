name: Mobile CI

on:
  push:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'

jobs:
  build:
    name: Build
    runs-on: macos-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: mobile/.build
          key: ${{ runner.os }}-spm-${{ hashFiles('mobile/**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Swift package dependencies
        run: xcodebuild -resolvePackageDependencies -scheme Ledge || true

      - name: Build
        run: |
          xcodebuild build \
            -scheme Ledge \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || xcodebuild build \
              -scheme Ledge \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO
