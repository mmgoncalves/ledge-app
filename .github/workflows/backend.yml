name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ledge
          POSTGRES_PASSWORD: ledge_dev_local
          POSTGRES_DB: ledge_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ledge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ledge:ledge_dev_local@localhost:5432/ledge_db

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://ledge:ledge_dev_local@localhost:5432/ledge_db

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ledge:ledge_dev_local@localhost:5432/ledge_db' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-jwt-secret-for-tests' }}
          JWT_EXPIRES_IN: '7d'
